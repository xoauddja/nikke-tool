<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>니케 리세계 간편 분석기</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { border: 2px dashed #444; background: #222; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
        #result-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .char-card { border: 2px solid #444; padding: 10px; width: 100px; opacity: 0.3; }
        .char-card.found { opacity: 1; border-color: #00ff00; background: #1e3a1e; box-shadow: 0 0 15px #00ff00; }
        img { width: 80px; height: 80px; border-radius: 5px; }
        #status { font-size: 1.2em; color: #007bff; margin: 20px; }
    </style>
</head>
<body>
    <h1>NIKKE 분석기 (가벼운 버전)</h1>
    <div id="status">상태: 준비 완료! 스샷을 붙여넣으세요.</div>
    
    <div class="box">
        매물 통스샷을 복사(Ctrl+C)하고 여기서 <b>Ctrl + V</b> 하세요.
    </div>

    <div id="result-container"></div>

    <script>
        const charList = [
            { id: 'cinderella', name: '신데렐라' }, { id: 'crown', name: '크라운' },
            { id: 'grave', name: '그레이브' }, { id: 'haran', name: '하란' },
            { id: 'liberallio', name: '리버렐리오' }, { id: 'modernia', name: '모더니아' },
            { id: 'nayuta', name: '나유타' }, { id: 'noah', name: '노아' },
            { id: 'siren', name: '세이렌' }, { id: 'snowwhite_h', name: '스노우 화이트' }
        ];

        // 화면 초기화
        const container = document.getElementById('result-container');
        charList.forEach(char => {
            const div = document.createElement('div');
            div.className = 'char-card';
            div.id = `card-${char.id}`;
            div.innerHTML = `<img src="./icons/${char.id}.png" onerror="this.style.display='none'"><div>${char.name}</div>`;
            container.appendChild(div);
        });

        window.addEventListener('paste', async (e) => {
            const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
            if (!item) return;

            document.getElementById('status').innerText = '분석 중...';
            const blob = item.getAsFile();
            const img = new Image();
            img.src = URL.createObjectURL(blob);

            img.onload = () => {
                // 이 버전은 복잡한 엔진 대신 '색상 분석'과 '패턴 매칭'을 간소화해서 진행합니다.
                // 일단 이미지 로드가 되는지부터 확인하기 위해 '모든 캐릭터 발견' 시뮬레이션을 돌립니다.
                setTimeout(() => {
                    charList.forEach(char => {
                        // 실제로는 여기서 이미지를 대조하지만, 우선 작동 확인을 위해
                        // 화면에 불이 들어오는지만 먼저 체크합니다.
                        document.getElementById(`card-${char.id}`).classList.add('found');
                    });
                    document.getElementById('status').innerText = '분석 완료! (테스트 모드)';
                }, 500);
            };
        });
    </script>
</body>
</html>
