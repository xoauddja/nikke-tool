<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>니케 매물표 정밀 분석기 (수정판)</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        #status { font-size: 1.5em; color: #007bff; margin: 20px; font-weight: bold; border: 2px solid #333; padding: 15px; border-radius: 10px; display: inline-block; background: #222; }
        #result-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .char-card { background: #222; border: 2px solid #444; border-radius: 8px; padding: 10px; width: 100px; opacity: 0.4; transition: 0.3s; }
        /* 진짜 찾았을 때만 불 들어오는 효과 */
        .char-card.found { opacity: 1; border-color: #00ff00; background: #1e3a1e; box-shadow: 0 0 20px #00ff00; transform: scale(1.05); }
        .char-card img { width: 80px; height: 80px; border-radius: 5px; object-fit: cover; }
        .rate { font-size: 14px; color: #ffcc00; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>NIKKE 분석기 🔍</h1>
    <div id="status">상태: 엔진 로딩 중...</div>
    
    <div style="background: #333; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <p>매물 통스샷을 복사(Ctrl+C)하고 여기서 <b>Ctrl + V</b> 하세요.</p>
    </div>

    <div id="result-container"></div>
</div>

<script async src="https://docs.opencv.org/4.5.2/opencv.js" onload="onCvReady()"></script>

<script>
    const charList = [
        { id: 'cinderella', name: '신데렐라' }, { id: 'crown', name: '크라운' },
        { id: 'grave', name: '그레이브' }, { id: 'haran', name: '하란' },
        { id: 'liberallio', name: '리버렐리오' }, { id: 'modernia', name: '모더니아' },
        { id: 'nayuta', name: '나유타' }, { id: 'noah', name: '노아' },
        { id: 'siren', name: '세이렌' }, { id: 'snowwhite_h', name: '스노우 화이트' }
    ];

    let templates = {};
    let isCvReady = false;

    async function onCvReady() {
        document.getElementById('status').innerText = '상태: 캐릭터 사진 불러오는 중...';
        renderInitialList();
        
        for (const char of charList) {
            try {
                // 깃허브 icons 폴더 내 이미지 로드
                const img = await loadImg(`./icons/${char.id}.png`); 
                templates[char.id] = cv.imread(img);
            } catch (e) { 
                console.log(char.id + " 사진 로드 실패"); 
            }
        }
        document.getElementById('status').innerText = '상태: 준비 완료! 스샷을 붙여넣으세요.';
        isCvReady = true;
    }

    function renderInitialList() {
        const container = document.getElementById('result-container');
        container.innerHTML = charList.map(char => `
            <div class="char-card" id="card-${char.id}">
                <img src="./icons/${char.id}.png" onerror="this.style.opacity='0.2'">
                <div style="font-size:12px; margin-top:5px;">${char.name}</div>
                <div class="rate" id="rate-${char.id}">0%</div>
            </div>
        `).join('');
    }

    window.addEventListener('paste', async (e) => {
        if (!isCvReady) return;
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (!item) return;

        document.getElementById('status').innerText = '매물표 정밀 분석 중...';
        
        const blob = item.getAsFile();
        const bitmap = await createImageBitmap(blob);
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width; canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);
        const src = cv.imread(canvas);

        // [수정 핵심] 분석 시작 전 모든 카드의 불을 끕니다.
        charList.forEach(c => {
            const card = document.getElementById(`card-${c.id}`);
            card.classList.remove('found');
            document.getElementById(`rate-${c.id}`).innerText = '0%';
        });

        for (const char of charList) {
            if (!templates[char.id]) continue;
            let templ = templates[char.id];
            let maxVal = 0;

            // 정밀도 향상을 위해 배율 조정 (0.6 ~ 1.2)
            for (let s of [0.6, 0.8, 1.0, 1.2]) {
                let resized = new cv.Mat();
                cv.resize(templ, resized, new cv.Size(templ.cols * s, templ.rows * s));
                
                if (resized.cols < src.cols && resized.rows < src.rows) {
                    let dst = new cv.Mat();
                    cv.matchTemplate(src, resized, dst, cv.TM_CCOEFF_NORMED);
                    let res = cv.minMaxLoc(dst);
                    if (res.maxVal > maxVal) maxVal = res.maxVal;
                    dst.delete();
                }
                resized.delete();
            }

            const percent = Math.round(maxVal * 100);
            document.getElementById(`rate-${char.id}`).innerText = percent + "%";
            
            // 기준치 75%로 상향 (오인식 방지)
            if (maxVal > 0.75) {
                document.getElementById(`card-${char.id}`).classList.add('found');
            }
        }
        src.delete();
        document.getElementById('status').innerText = '분석 완료!';
    });

    function loadImg(url) {
        return new Promise((res, rej) => { 
            let i = new Image(); i.onload = () => res(i); i.onerror = () => rej(); i.src = url; 
        });
    }
</script>
</body>
</html>
